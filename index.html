<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy New Year ✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet">

<style>
/* ===== BASE ===== */
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle, #020024, #090979, #000);
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
}

/* ===== ENTRY OVERLAY ===== */
.overlay {
    position: absolute;
    inset: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    z-index: 10;
    animation: pulse 2s infinite;
}

.overlay span {
    font-size: 1.5rem;
    opacity: 0.85;
}

@keyframes pulse {
    0% { opacity: 0.6 }
    50% { opacity: 1 }
    100% { opacity: 0.6 }
}

/* ===== FRONT CONTENT ===== */
.box {
    z-index: 2;
}

h1 {
    font-size: 3rem;
    margin-bottom: 25px;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

.reveal-btn {
    padding: 12px 26px;
    border: 1px solid white;
    background-color: rgba(0,0,0,0.35);
    color: white;
    cursor: pointer;
    font-size: 1.1rem;
    transition: background 0.3s, box-shadow 0.3s, transform 0.4s;
}

.reveal-btn:hover {
    background: rgba(255,255,255,0.08);
    box-shadow: 0 0 14px rgba(255,255,255,0.25);
}

.reveal-btn.hide {
    opacity: 0;
    transform: scale(0.85);
    pointer-events: none;
}

/* ===== PAPER ROLL ===== */
.paper-roll {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 0; /* will expand */
    background: linear-gradient(to bottom, #9a2d4f, #6f1635, #3a0b1d);
    z-index: 5;
    overflow-y: auto;
    transition: height 2s ease;
    box-shadow: inset 0 -30px 40px rgba(0,0,0,0.2);
    -webkit-overflow-scrolling: touch;
}

.paper-roll::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.02),
        rgba(255,255,255,0.02) 1px,
        transparent 1px,
        transparent 12px
    );
    opacity: 0.1;
    pointer-events: none;
}

.paper-roll::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(
        ellipse at center,
        rgba(255,255,255,0.03) 0%,
        rgba(0,0,0,0.25) 70%,
        rgba(0,0,0,0.08) 100%
    );
    pointer-events: none;
}

.paper-roll.open {
    height: 100vh;
}

/* ===== PAPER CONTENT ===== */
.paper-content {
    opacity: 0;
    padding: 60px 40px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    color: #ffffff;
    transition: opacity 1.5s ease;
    transition-delay: 2s;
}

.paper-content .greeting {
    font-family: 'Caveat', cursive;
    font-size: 2rem;
    margin-bottom: 40px;
    text-align: left;
    column-count: 1;
    line-height: 2;
}

.paper-content .main-message {
    font-family: 'Caveat', cursive;
    font-size: 1.6rem;
    line-height: 2;
    font-weight: 500;
    max-width: 900px;
    margin: 0 auto;
    column-count: 2;
    column-gap: 60px;
    text-align: justify;
    hyphens: auto;
    text-shadow: 0 2px 6px rgba(0,0,0,0.35);
}

.paper-roll.open .paper-content {
    opacity: 1;
}

@media (max-width: 768px) {
    .paper-content { padding: 80px 30px; }
    .paper-content .main-message { column-count: 1; }
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    animation: fly linear infinite;
}

@keyframes fly {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

// ===== EXPERIENCE FUNCTIONS =====
function startExperience() {

    const music = document.getElementById("bgm");
    music.volume = 0;
    music.play();

function revealMessage() {

}

}
</script>

</html>
